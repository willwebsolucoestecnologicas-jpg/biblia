<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bíblico Imersivo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</head>
<body>

    <div class="ambient-glow"></div>

    <div id="chat-timeline">
        <div class="message-block">
            <div class="bible-msg">"E conhecereis a verdade, e a verdade vos libertará."</div>
            <div class="user-msg" style="margin-top: 10px; font-size: 0.9rem;">O que busca em seu coração hoje?</div>
        </div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Fale comigo..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="script.js" defer></script>
    <div id="share-card-container" style="display: none;">
        <div id="share-card">
            <div class="card-header">
                <span class="app-logo-text">Chat Bíblico Imersivo</span>
            </div>
            <div id="card-content" class="bible-msg">
                </div>
            <div class="card-footer">
                <span>"E conhecereis a verdade..."</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js" defer></script>

</body>
</html>
