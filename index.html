<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Bíblico Imersivo</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>

  <div class="ambient-glow"></div>
  <div class="grain"></div>

  <header class="app-header">
    <span class="app-brand">Chat Bíblico <em>Imersivo</em></span>
  </header>

  <main id="chat-timeline">
    <div class="exchange intro">
      <div class="bible-msg">"E conhecereis a verdade, e a verdade vos libertará."</div>
      <p class="prompt-msg">O que busca em seu coração hoje?</p>
    </div>
  </main>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="Fale comigo..." autocomplete="off">
    <button id="send-btn" aria-label="Enviar mensagem">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12H20M20 12L14 6M20 12L14 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div id="share-card-container">
    <div id="share-card">
      <div class="card-header">
        <span class="app-logo-text">Chat Bíblico Imersivo</span>
      </div>
      <div id="card-content" class="bible-msg"></div>
      <div class="card-footer">
        <span>"E conhecereis a verdade..."</span>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
