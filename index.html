<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bíblico Imersivo</title>
    <style>
        /* RESET E FONTES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap');

        /* FUNDO DINÂMICO E ESCURO */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* BRILHO DE FUNDO ANIMADO */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(25, 40, 70, 0.4) 0%, rgba(5, 5, 5, 0) 70%);
            z-index: 0;
            animation: breathe 8s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* CONTAINER DA CONVERSA */
        #chat-timeline {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 120px 20px;
            overflow-y: auto;
            z-index: 1;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* OCULTAR SCROLLBAR PARA FICAR CLEAN */
        #chat-timeline::-webkit-scrollbar {
            display: none;
        }

        /* ESTILOS DAS MENSAGENS (SEM BALÕES) */
        .message-block {
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.8s forwards ease-out;
        }

        .user-msg {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .bible-msg {
            font-family: 'Cinzel', serif; /* Fonte clássica e elegante */
            font-size: 1.5rem;
            line-height: 1.6;
            color: #E8D3A2; /* Tom de ouro envelhecido/pergaminho */
            text-shadow: 0px 0px 15px rgba(232, 211, 162, 0.2);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* EFEITO DE PALAVRAS SURGINDO */
        .word-reveal {
            opacity: 0;
            animation: fadeInWord 0.5s forwards ease-in-out;
        }

        @keyframes fadeInWord {
            to { opacity: 1; text-shadow: 0px 0px 10px rgba(232, 211, 162, 0.5); }
        }

        /* ÁREA DE DIGITAÇÃO MINIMALISTA */
        #input-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            z-index: 2;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            display: flex;
            padding: 10px 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        #input-container:focus-within {
            border-color: rgba(232, 211, 162, 0.5);
            box-shadow: 0px 0px 20px rgba(232, 211, 162, 0.1);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #send-btn {
            background: transparent;
            border: none;
            color: #E8D3A2;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-left: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: opacity 0.3s ease;
        }

        #send-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div id="chat-timeline">
        <div class="message-block">
            <div class="bible-msg">"E conhecereis a verdade, e a verdade vos libertará."</div>
            <div class="user-msg" style="margin-top: 10px; font-size: 0.9rem;">O que busca em seu coração hoje?</div>
        </div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Fale comigo..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>

    <script>
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const timeline = document.getElementById('chat-timeline');

        // Função para adicionar a mensagem do usuário na tela
        function addUserMessage(text) {
            const block = document.createElement('div');
            block.className = 'message-block';
            block.innerHTML = `<div class="user-msg">${text}</div>`;
            timeline.appendChild(block);
            scrollToBottom();
        }

        // Função para simular a resposta da IA/Bíblia com efeito de revelação
        function addBibleResponse(text) {
            const block = document.createElement('div');
            block.className = 'message-block';
            
            const textContainer = document.createElement('div');
            textContainer.className = 'bible-msg';
            block.appendChild(textContainer);
            timeline.appendChild(block);

            // Divide o texto em palavras para animar uma a uma
            const words = text.split(' ');
            textContainer.innerHTML = ''; // Limpa antes de começar

            words.forEach((word, index) => {
                const span = document.createElement('span');
                span.textContent = word + ' ';
                span.className = 'word-reveal';
                // Atraso escalonado para cada palavra
                span.style.animationDelay = `${index * 0.15}s`; 
                textContainer.appendChild(span);
            });

            scrollToBottom();
        }

        function scrollToBottom() {
            timeline.scrollTo({
                top: timeline.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Simulação do envio
        function handleSend() {
            const text = inputField.value.trim();
            if (!text) return;

            addUserMessage(text);
            inputField.value = '';

            // Simula o tempo de processamento da IA (1.5 segundos)
            setTimeout(() => {
                const simulacaoResposta = "Não andeis ansiosos por coisa alguma; antes, em tudo, sejam os vossos pedidos conhecidos diante de Deus pela oração e súplica com ações de graças.";
                addBibleResponse(simulacaoResposta);
            }, 1500);
        }

        sendBtn.addEventListener('click', handleSend);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>

</body>
</html>
